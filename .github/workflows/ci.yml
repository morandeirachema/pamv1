name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26"
      - name: gofmt
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - name: vet
        run: go vet ./...
      - name: staticcheck
        # Catches bugs and deprecations go vet misses. @latest tracks the Go
        # toolchain (a pinned older staticcheck may not parse a new Go release).
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          "$(go env GOPATH)/bin/staticcheck" ./...
      - name: govulncheck
        # Fails the build on a KNOWN vulnerability that our code actually reaches
        # (in a dependency or the Go stdlib).
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...
      - name: gosec
        # Security static analysis. Deliberate findings are recorded inline with
        # `#nosec Gxxx -- reason`. Excluded rules are pervasively-deliberate or noisy
        # for a PAM and would only add suppression clutter:
        #   G104 unhandled errors  — best-effort audit/flush calls on cleanup paths
        #   G115 integer overflow  — safe conversions (TOTP counters, HMAC lengths)
        #   G304 file inclusion    — every hit loads an operator-configured file, not request input
        #   G306 WriteFile perms   — the archgen dev tool writing a public doc
        #   G101 hardcoded creds   — LOW-confidence false positives (capability-name maps, CHANGE_ME placeholders)
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          "$(go env GOPATH)/bin/gosec" -quiet -confidence high -exclude=G104,G115,G304,G306,G101 ./...
      - name: build
        run: go build ./...
      - name: architecture diagrams up to date
        run: go run ./cmd/archgen && git diff --exit-code docs/ARCHITECTURE-DIAGRAMS.md
      - name: test
        run: go test -race ./...

  # The PKCS#11 HSM KEK provider is behind the "pkcs11" build tag (cgo). Verify
  # it against SoftHSM2 — a software PKCS#11 token — so the HSM path is tested
  # without real hardware. The default `test` job never builds this code.
  pkcs11:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26"
      - name: install SoftHSM2
        run: sudo apt-get update && sudo apt-get install -y softhsm2
      - name: init token
        run: |
          export SOFTHSM2_CONF="$PWD/.softhsm2.conf"
          mkdir -p "$PWD/tokens"
          printf 'directories.tokendir = %s/tokens\nobjectstore.backend = file\nlog.level = ERROR\n' "$PWD" > "$SOFTHSM2_CONF"
          softhsm2-util --init-token --free --label pamv1-test --pin 1234 --so-pin 5678
      - name: test (pkcs11 tag, cgo)
        run: |
          export SOFTHSM2_CONF="$PWD/.softhsm2.conf"
          MODULE=/usr/lib/softhsm/libsofthsm2.so
          [ -f "$MODULE" ] || MODULE=/usr/lib/x86_64-linux-gnu/softhsm/libsofthsm2.so
          export PAM_TEST_PKCS11_MODULE="$MODULE"
          export PAM_TEST_PKCS11_PIN=1234
          export PAM_TEST_PKCS11_TOKEN=pamv1-test
          CGO_ENABLED=1 go test -tags pkcs11 ./internal/vault/ -run PKCS11 -v

  # Run the store conformance suite against a live PostgreSQL, so the pgstore
  # SQL and migrations are verified (the default `test` job skips it because
  # PAM_TEST_DATABASE_URL is unset).
  pgstore:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: pam
          POSTGRES_PASSWORD: pam
          POSTGRES_DB: pam
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26"
      - name: store contract test (live Postgres)
        env:
          PAM_TEST_DATABASE_URL: postgres://pam:pam@localhost:5432/pam?sslmode=disable
        run: go test ./internal/store/pgstore/ -run PGStoreContract -v

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: build image
        run: docker build -f deploy/docker/Dockerfile -t pamv1:ci .

  # Phase 14: prove the committed SOPS example is really encrypted and round-trips
  # with the throwaway demo key (guards against an accidental plaintext commit).
  sops:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26"
      - name: install sops + age
        run: |
          go install github.com/getsops/sops/v3/cmd/sops@v3.13.2
          go install filippo.io/age/cmd/age@v1.3.1
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: verify SOPS example
        run: ./deploy/k8s/sops/verify.sh
