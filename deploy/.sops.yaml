# SOPS (https://github.com/getsops/sops) creation rules for pamv1 (Phase 14).
#
# This config lives at deploy/.sops.yaml (not the repo root), so its path_regex is
# relative to deploy/ and you must pass it explicitly when encrypting:
#   sops --config deploy/.sops.yaml -e -i deploy/k8s/sops/secrets.sops.yaml   # from the repo root
#   (or: cd deploy && sops -e -i k8s/sops/secrets.sops.yaml)
# Decryption needs no config (recipients are read from the sealed file's metadata).
#
# Any file matching a rule below is encrypted with the listed recipients, and only
# the `data` / `stringData` *values* of a
# Kubernetes Secret are sealed — `kind`, `metadata`, keys, etc. stay in cleartext
# so the manifest is still reviewable and diff-able in git.
#
# >>> REPLACE the example age recipient below with YOUR OWN public key <<<
#     age-keygen -o age.key            # keep age.key OUT of git (it is .gitignore'd)
#     grep 'public key' age.key        # copy the age1... recipient here
#
# The committed example (deploy/k8s/sops/secrets.sops.example.yaml) is encrypted to
# the throwaway key deploy/k8s/sops/age-example.key — for learning only; never
# deploy real secrets sealed to that key (its private half is public in this repo).
creation_rules:
  - path_regex: k8s/sops/secrets.*\.ya?ml$
    encrypted_regex: ^(data|stringData)$
    # age recipients (comma-separated for multiple custodians / KMS fallback).
    age: age1pfn57mnl9gg6c5tu05tgaym2jk8kzgxnwf20hd008lzghsp6vyrqetlmny

  - path_regex: helm/.*secrets.*\.ya?ml$
    encrypted_regex: ^(PAM_.*|.*[Pp]assword)$
    age: age1pfn57mnl9gg6c5tu05tgaym2jk8kzgxnwf20hd008lzghsp6vyrqetlmny
