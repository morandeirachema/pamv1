{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "pamv1.fullname" . }}-default-deny
  labels:
    {{- include "pamv1.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "pamv1.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # App ports (API/portal + SSH proxy). Restrict `from` to your ingress
    # controller / bastion CIDRs in production.
    - ports:
        - protocol: TCP
          port: {{ .Values.service.httpPort }}
        - protocol: TCP
          port: {{ .Values.service.sshPort }}
  egress:
    # DNS.
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # PostgreSQL backend.
    - to:
        - podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.postgresPodLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5432
    {{- if .Values.guacd.enabled }}
    # Bundled guacd (RDP broker) — pam-server dials it on 4822. Both pods' policies
    # must permit the flow, so this mirrors the ingress rule in guacd.yaml.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "pamv1.guacdName" . }}
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 4822
    {{- end }}
    # Managed target networks (block public egress / exfiltration by default).
    - to:
        {{- range .Values.networkPolicy.egressTargetCIDRs }}
        - ipBlock:
            cidr: {{ . }}
        {{- end }}
{{- end }}
