apiVersion: v1
kind: Service
metadata:
  name: {{ include "pamv1.fullname" . }}
  labels:
    {{- include "pamv1.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "pamv1.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.httpPort }}
      targetPort: http
    - name: ssh
      port: {{ .Values.service.sshPort }}
      targetPort: ssh
