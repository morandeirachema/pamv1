apiVersion: apps/v1
kind: Deployment
metadata:
  name: pam-server
  namespace: pamv1
  labels:
    app.kubernetes.io/name: pamv1
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pamv1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pamv1
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: pam-server
          image: ghcr.io/morandeirachema/pamv1:latest
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 2222
              name: ssh
          envFrom:
            - secretRef:
                name: pam-secrets
          env:
            - name: PAM_SSH_HOST_KEY
              value: /data/ssh_host_key
            - name: PAM_RECORDING_DIR
              value: /data/recordings
          volumeMounts:
            - name: data
              mountPath: /data
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
      volumes:
        # Writable state (host key + recordings) since the root FS is read-only.
        # Swap for a PersistentVolumeClaim to retain recordings across restarts.
        - name: data
          emptyDir: {}
