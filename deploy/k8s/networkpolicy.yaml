# Default-deny NetworkPolicy for the pamv1 vault pod.
#
# Without this, any pod in the cluster can reach the API (8080) and SSH proxy
# (2222) of the credential vault, and the vault can egress anywhere. This policy
# denies all traffic to/from the pamv1 pod except:
#   - ingress on the app ports (8080 API/portal, 2222 SSH proxy),
#   - egress to DNS and the PostgreSQL backend,
#   - egress to the private target ranges the proxy connects to.
#
# TIGHTEN THIS for your environment: scope the ingress `from` to your ingress
# controller / operator CIDRs, and replace the RFC-1918 egress blocks with the
# exact target networks (and any alert-webhook / IdP / KMS endpoints) you use.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pamv1-default-deny
  namespace: pamv1
  labels:
    app.kubernetes.io/name: pamv1
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: pamv1
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Operators/ingress reach the API/portal and SSH proxy. Restrict `from` to
    # your ingress controller or bastion CIDRs in production.
    - ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 2222
        # Uncomment if the PostgreSQL session proxy (PAM_DB_ADDR) is enabled:
        # - protocol: TCP
        #   port: 5433
  egress:
    # DNS resolution.
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # PostgreSQL backend (CloudNativePG cluster pamv1-pg).
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: pamv1-pg
      ports:
        - protocol: TCP
          port: 5432
    # Managed targets the proxy connects to (SSH/RDP/WinRM/PostgreSQL). Scope
    # these to your actual target networks; the RFC-1918 defaults block public
    # egress (exfiltration) while allowing internal targets.
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8
        - ipBlock:
            cidr: 172.16.0.0/12
        - ipBlock:
            cidr: 192.168.0.0/16
