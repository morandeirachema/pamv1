# To keep this secret encrypted IN the IaC repo, use SOPS instead — see
# deploy/k8s/sops/ (Phase 14). Otherwise, copy to secret.yaml (git-ignored) or
# create via kubectl:
#   kubectl -n pamv1 create secret generic pam-secrets \
#     --from-literal=PAM_MASTER_KEY=... \
#     --from-literal=PAM_API_KEY=... \
#     --from-literal=PAM_BREAK_GLASS_KEY_HASH=... \
#     --from-literal=PAM_DATABASE_URL='postgres://pam:...@pamv1-pg-rw:5432/pam?sslmode=require'
#
# PAM_DATABASE_URL points at the CloudNativePG read-write service (postgres-cnpg.yaml):
# `pamv1-pg-rw` always resolves to the current primary, so writes follow an
# automatic failover. The app user's password lives in the CNPG-managed secret
# `pamv1-pg-app` — copy it in here:
#   kubectl -n pamv1 get secret pamv1-pg-app -o jsonpath='{.data.password}' | base64 -d
# (or reference that secret's ready-made `uri` key straight from the Deployment).
apiVersion: v1
kind: Secret
metadata:
  name: pam-secrets
  namespace: pamv1
type: Opaque
stringData:
  PAM_MASTER_KEY: "CHANGE_ME"
  PAM_API_KEY: "CHANGE_ME"
  PAM_BREAK_GLASS_KEY_HASH: ""
  PAM_DATABASE_URL: "postgres://pam:CHANGE_ME@pamv1-pg-rw:5432/pam?sslmode=require"
