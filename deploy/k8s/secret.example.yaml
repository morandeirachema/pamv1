# Copy to secret.yaml (git-ignored by convention) or create via kubectl:
#   kubectl -n pamv1 create secret generic pam-secrets \
#     --from-literal=PAM_MASTER_KEY=... \
#     --from-literal=PAM_API_KEY=... \
#     --from-literal=PAM_BREAK_GLASS_KEY_HASH=... \
#     --from-literal=PAM_DATABASE_URL=postgres://pam:...@postgres:5432/pam
apiVersion: v1
kind: Secret
metadata:
  name: pam-secrets
  namespace: pamv1
type: Opaque
stringData:
  PAM_MASTER_KEY: "CHANGE_ME"
  PAM_API_KEY: "CHANGE_ME"
  PAM_BREAK_GLASS_KEY_HASH: ""
  PAM_DATABASE_URL: "postgres://pam:CHANGE_ME@postgres.pamv1.svc:5432/pam"
