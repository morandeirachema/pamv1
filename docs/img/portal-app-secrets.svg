<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 430" font-family="ui-monospace, 'Cascadia Mono', Menlo, Consolas, monospace" font-size="15">
  <defs>
    <pattern id="scan2" width="1" height="3" patternUnits="userSpaceOnUse">
      <rect width="1" height="1" fill="rgba(0,0,0,0.22)"/>
    </pattern>
    <filter id="glow2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .g{fill:#2eff7b}.w{fill:#eaffea}.c{fill:#4be0e0}.d{fill:#2f7d4a}
      text{white-space:pre}
    </style>
  </defs>
  <rect width="900" height="430" fill="#050705"/>
  <rect x="10" y="10" width="880" height="410" fill="none" stroke="#123c1f" rx="6"/>
  <g filter="url(#glow2)">
    <text x="28" y="42" class="w">PAMWRKAPP</text>
    <text x="450" y="42" class="g" text-anchor="middle">Work with Application Secrets</text>
    <text x="872" y="42" class="w" text-anchor="end">SYSTEM: PAMV1</text>
    <text x="28" y="64" class="g">bootstrap-admin / admin</text>
    <text x="872" y="64" class="c" text-anchor="end">21/07/26  18:53:11</text>
    <line x1="28" y1="76" x2="872" y2="76" stroke="#123c1f"/>

    <text x="28" y="102" class="g">Non-agent applications that fetch the secrets they are granted with a bearer key.</text>
    <text x="28" y="123" class="g">Type options, press Enter.  <tspan class="c">4=Revoke   5=Work with secret grants</tspan></text>

    <!-- subfile (Opt = a single-char entry cell) -->
    <text x="64" y="160" class="w" xml:space="preserve">Opt  ID    Name             Owner         Status   Created</text>
    <text x="64" y="184" class="g" xml:space="preserve">[ ]  3     orders-svc       payments      active   2026-07-21 16:52</text>
    <text x="64" y="205" class="g" xml:space="preserve">[ ]  8     ci-runner        platform      active   2026-07-21 15:10</text>

    <text x="28" y="248" class="g" xml:space="preserve">An app fetches: <tspan class="w">GET /v1/app-secrets/{credential_id}</tspan> with <tspan class="w">Authorization: Bearer</tspan> its</text>
    <text x="28" y="269" class="g">token. Default-deny — grant credentials with option 5. Use HTTPS.</text>

    <line x1="28" y1="300" x2="872" y2="300" stroke="#123c1f"/>
    <text x="28" y="324" class="c">F3=Exit   F5=Refresh   F6=Add application   F12=Cancel</text>
    <text x="28" y="345" class="d" font-size="13">Enter=Confirm   Esc=Back   Tab / ↑↓=Move   (the mouse is optional)</text>
  </g>
  <rect width="900" height="430" fill="url(#scan2)"/>
</svg>
