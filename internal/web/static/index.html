<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PAMV1 — Privileged Access Management</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: #050705; color: #2eff7b;
    font: 16px/1.35 "IBM Plex Mono", ui-monospace, "Cascadia Mono", Menlo, Consolas, monospace;
    text-shadow: 0 0 5px rgba(46, 255, 123, .35);
    display: flex; justify-content: center;
  }
  body::after { /* CRT scanlines */
    content: ""; position: fixed; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,.22) 0 1px, transparent 1px 3px);
  }
  #term { width: 100%; max-width: 980px; padding: 12px 16px; white-space: pre-wrap; }
  a, .green { color: #2eff7b; }
  .white { color: #eaffea; text-shadow: 0 0 5px rgba(234,255,234,.35); }
  .cyan  { color: #4be0e0; text-shadow: 0 0 5px rgba(75,224,224,.35); }
  .red   { color: #ff4d4d; text-shadow: 0 0 5px rgba(255,77,77,.45); }
  .amber { color: #ffcf55; text-shadow: 0 0 5px rgba(255,207,85,.4); }
  .blink { animation: blink 1s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  .row { display: flex; justify-content: space-between; }
  hr { border: 0; border-top: 1px solid #123c1f; margin: 6px 0; }
  table { width: 100%; border-collapse: collapse; }
  td, th { text-align: left; padding: 1px 8px 1px 0; font-weight: normal; white-space: nowrap; }
  th { color: #eaffea; }
  td.detail { white-space: normal; }
  input, select {
    font: inherit; color: #2eff7b; background: #041407;
    border: 0; border-bottom: 1px solid #2eff7b; outline: none; padding: 0 2px;
    text-shadow: inherit; caret-color: #2eff7b;
  }
  select { border: 1px solid #123c1f; }
  input:focus, select:focus, a:focus { background: #0a2a12; outline: 1px solid #4be0e0; }
  input.opt { width: 3ch; text-align: center; text-transform: uppercase; }
  input[type=checkbox] { width: auto; }
  .fkeys { color: #4be0e0; margin-top: 8px; }
  .khint { color: #2f7d4a; margin-top: 2px; font-size: 0.9em; }
  .msg { min-height: 1.3em; color: #eaffea; }
  .msg.err { color: #ff4d4d; }
  form.inline { display: inline; }
  label { display: block; }
  .indent { margin-left: 4ch; }
</style>
</head>
<body>
<div id="term"></div>
<script nonce="__CSP_NONCE__">
(() => {
  const term = document.getElementById("term");
  let apiKey = sessionStorage.getItem("pam_api_key") || "";
  let me = null; // { name, role, break_glass, capabilities:[] }

  // Pick up a token/error handed back by the OIDC callback in the URL fragment.
  let ssoMsg = "", ssoErr = false;
  if (location.hash.length > 1) {
    const h = new URLSearchParams(location.hash.slice(1));
    if (h.get("pam_token")) { apiKey = h.get("pam_token"); sessionStorage.setItem("pam_api_key", apiKey); ssoMsg = "SINGLE SIGN-ON COMPLETE."; }
    else if (h.get("pam_error")) { ssoMsg = "SSO FAILED: " + h.get("pam_error").toUpperCase(); ssoErr = true; }
    history.replaceState(null, "", location.pathname + location.search);
  }

  let screen = apiKey ? "main" : "signon";
  let back = "main";
  let msg = ssoMsg, msgErr = ssoErr;
  // Per-screen data.
  let targets = [], creds = [], audit = [], sessions = [], requests = [], checkouts = [], users = [], grants = [];
  let apps = [], appGrants = [], grantsApp = 0, newApp = null;
  let viewCred = null, grantsTarget = 0, newUser = null, mfaInfo = null, mfaEnroll = null, recoveryCodes = [], discovered = null, reconcileReport = null;
  let profiles = [], configItems = [], configNote = "", effCfg = null, iacText = "", iacFormat = "";
  let liveTimer = null;

  const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  const pad = (s, n) => esc(String(s ?? "")).padEnd(n);
  const can = (c) => !!(me && me.capabilities && me.capabilities.includes(c));
  const fmtTime = (t) => t ? esc(String(t).replace("T", " ").slice(0, 19)) : "-";
  const now = () => { const d = new Date(), z = (x) => String(x).padStart(2, "0");
    return `${z(d.getDate())}/${z(d.getMonth() + 1)}/${String(d.getFullYear()).slice(2)}  ${z(d.getHours())}:${z(d.getMinutes())}:${z(d.getSeconds())}`; };

  async function api(method, path, body) {
    const res = await fetch(path, {
      method,
      headers: { "X-API-Key": apiKey, ...(body ? { "Content-Type": "application/json" } : {}) },
      body: body ? JSON.stringify(body) : undefined,
    });
    if (res.status === 204) return null;
    const data = await res.json().catch(() => ({}));
    if (!res.ok) {
      const err = new Error((data.error || res.statusText).toUpperCase());
      err.status = res.status;
      throw err;
    }
    return data;
  }

  // loadMe resolves the caller's identity + capabilities so the menu shows only
  // the options the role may use. Panels still tolerate a 403 as a backstop.
  async function loadMe() { me = await api("GET", "/api/me"); }

  const say = (t, err) => { msg = t; msgErr = !!err; };
  function stopLive() { if (liveTimer) { clearInterval(liveTimer); liveTimer = null; } }

  function head(id, title) {
    return `<div class="row"><span class="white">${id}</span><span>${title}</span><span class="white">SYSTEM: PAMV1</span></div>` +
           `<div class="row"><span>${me ? esc(me.name) + " / " + esc(me.role) + (me.break_glass ? " (BREAK-GLASS)" : "") : ""}</span><span class="cyan">${now()}</span></div><hr>`;
  }
  const fkeys = (t) => `<hr><div class="fkeys">${t}</div>` +
    `<div class="khint">Enter=Confirm&nbsp;&nbsp;Esc=Back&nbsp;&nbsp;Tab / ↑↓=Move&nbsp;&nbsp;(the mouse is optional)</div>` +
    `<div class="msg${msgErr ? " err" : ""}">${esc(msg)}</div>`;

  // opt renders a subfile option input; optCell reads the typed option for a row.
  const opt = (id) => `<input class="opt" name="o${esc(id)}" maxlength="1">`;
  const optVal = (form, id) => (form["o" + id]?.value || "").trim();

  // --- async openers: fetch the screen's data, then render it. Also used by F5. ---
  async function openTargets() { try { targets = await api("GET", "/api/targets"); } catch (e) { targets = []; } go("targets"); }
  async function openCreds() { try { [targets, creds] = await Promise.all([api("GET", "/api/targets").catch(() => []), api("GET", "/api/credentials")]); } catch (e) { creds = []; } go("creds"); }
  async function openSessions() { try { sessions = await api("GET", "/api/sessions"); } catch (e) { sessions = []; } go("sessions"); }
  async function openCheckouts() { try { [targets, checkouts] = await Promise.all([api("GET", "/api/targets").catch(() => []), api("GET", "/api/checkouts?active=true")]); } catch (e) { checkouts = []; } go("checkouts"); }
  async function openUsers() { try { [users, profiles] = await Promise.all([api("GET", "/api/users"), api("GET", "/api/profiles").catch(() => [])]); } catch (e) { users = []; } go("users"); }
  async function openProfiles() { try { profiles = await api("GET", "/api/profiles"); } catch (e) { profiles = []; } go("profiles"); }
  async function openConfig() { try { const r = await api("GET", "/api/config"); configItems = r.settings || []; configNote = r.note || ""; } catch (e) { configItems = []; } go("config"); }
  async function openEffective() { try { effCfg = await api("GET", "/api/config/effective"); } catch (e) { effCfg = null; } go("effective"); }
  async function openMfa() { try { mfaInfo = await api("GET", "/api/mfa"); } catch (e) { mfaInfo = { enrolled: false, confirmed: false }; } go("mfa"); }
  async function openAudit() { try { audit = await api("GET", "/api/audit?limit=100"); } catch (e) { audit = []; } go("audit"); }
  async function openReconcile() { reconcileReport = null; try { reconcileReport = await api("GET", "/api/reconcile"); } catch (e) {} go("reconcile"); }
  async function openGrants(tid) { grantsTarget = tid; try { grants = await api("GET", `/api/targets/${tid}/grants`); } catch (e) { grants = []; } go("grants"); }
  async function openRequests() {
    requests = [];
    if (can("approve")) { try { requests = await api("GET", "/api/access-requests"); } catch (e) {} }
    if (targets.length === 0) { try { targets = await api("GET", "/api/targets"); } catch (e) {} }
    go("requests");
  }
  // Application-secrets console (Phase 24). The routes exist only when the API is
  // enabled (PAM_APP_SECRETS_ENABLED); a 404 shows a helpful hint instead of an error.
  async function openApps() {
    apps = [];
    try { apps = await api("GET", "/v1/apps"); }
    catch (e) { if (e.status === 404) say("APPLICATION-SECRETS API IS DISABLED (set PAM_APP_SECRETS_ENABLED)."); }
    go("apps");
  }
  async function openAppGrants(aid) {
    grantsApp = aid; appGrants = [];
    try {
      [creds, appGrants] = await Promise.all([
        api("GET", "/api/credentials").catch(() => creds),
        api("GET", `/v1/apps/${aid}/grants`),
      ]);
      if (targets.length === 0) { try { targets = await api("GET", "/api/targets"); } catch (e) {} }
    } catch (e) { appGrants = []; }
    go("appgrants");
  }

  const targetName = (id) => { const t = targets.find((x) => x.id === id); return t ? t.name : id; };

  // reconcileIdentities revokes directory users who have been disabled upstream.
  async function reconcileIdentities() {
    const r = await api("POST", "/api/identity/reconcile");
    say(`IDENTITY RECONCILE: checked ${r.checked ?? "?"}, revoked ${r.revoked ?? 0}.`);
    await openUsers();
  }

  // exportAudit downloads the tamper-evident CSV export and shows its digest.
  async function exportAudit() {
    const res = await fetch("/api/audit/export?format=csv", { headers: { "X-API-Key": apiKey } });
    if (!res.ok) { say("CPF9999: EXPORT FAILED (" + res.status + ")", true); render(); return; }
    const digest = res.headers.get("X-PAM-Export-SHA256") || "";
    const url = URL.createObjectURL(await res.blob());
    const a = document.createElement("a");
    a.href = url; a.download = "pamv1-audit-export.csv"; a.click();
    URL.revokeObjectURL(url);
    say("AUDIT EXPORTED — SHA256 " + digest.slice(0, 16) + "…");
    render();
  }

  // exportIaC fetches the console-set overrides rendered as env/Helm/Terraform
  // and shows them on the iacview screen to copy into the deployment's IaC.
  async function exportIaC(format) {
    try {
      const r = await api("GET", "/api/config/iac?format=" + format);
      iacText = r.content || ""; iacFormat = r.format || format;
      go("iacview");
    } catch (e) { say("CPF9999: " + e.message, true); render(); }
  }

  function render() {
    ({
      signon() {
        term.innerHTML = `
<div style="text-align:center" class="white">Sign On</div>
<div class="indent">
                                    System  . . . . . :   <span class="white">PAMV1</span>
                                    Subsystem . . . . :   <span class="white">QPAM</span>
                                    Display . . . . . :   <span class="white">QPADEV0001</span>
</div>

<form id="f-signon" class="indent">
  <label>User . . . . . . . . . . . . . . . :  <input id="in-user" size="28" autocomplete="username" autofocus></label>
  <label>Password . . . . . . . . . . . . . :  <input id="in-pass" type="password" size="28" autocomplete="current-password"></label>
  <label>MFA code (if enabled)  . . . . . . :  <input id="in-otp" size="8" inputmode="numeric" autocomplete="one-time-code"></label>
  <label>...or access token . . . . . . . . :  <input id="in-key" type="password" size="28" autocomplete="off"></label>
</form>

<div class="cyan indent">Directory (AD) users: enter User + Password (+ MFA code if enrolled). Token
users: leave Password blank and enter the access token. Press Enter to sign on.
Single sign-on (OIDC): <a href="/api/auth/oidc/start" style="color:#4be0e0">/api/auth/oidc/start</a></div>
${fkeys("")}
<div class="red indent">UNAUTHORIZED USE OF THIS SYSTEM IS PROHIBITED AND AUDITED.</div>`;
        document.getElementById("f-signon").onsubmit = async (ev) => {
          ev.preventDefault();
          const user = document.getElementById("in-user").value.trim();
          const pass = document.getElementById("in-pass").value;
          const otp = document.getElementById("in-otp").value.trim();
          const tok = document.getElementById("in-key").value.trim();
          try {
            if (pass) {
              const res = await fetch("/api/login", {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username: user, password: pass, otp }),
              });
              const d = await res.json().catch(() => ({}));
              if (d.mfa_required) throw new Error("MFA CODE REQUIRED — ENTER YOUR 6-DIGIT CODE");
              if (!res.ok) throw new Error((d.error || res.statusText).toUpperCase());
              apiKey = d.token;
            } else {
              apiKey = tok || user;
            }
            await loadMe();
            sessionStorage.setItem("pam_api_key", apiKey);
            say("SIGN ON COMPLETE.");
            go("main");
          } catch (e) { apiKey = ""; say("CPF1120: " + e.message, true); render(); }
        };
      },

      main() {
        back = "main";
        const line = (num, show, label) => show ? `${String(num).padStart(2)}. ${label}\n` : "";
        const menu =
          line(1, can("read_inventory"), "Work with targets") +
          line(2, can("read_inventory"), "Work with credentials") +
          line(3, can("reveal_secret"), "Credential check-out / check-in") +
          line(4, can("read_audit"), "Work with active sessions") +
          line(5, can("approve") || can("connect"), "Work with access requests") +
          line(6, can("manage_credentials"), "Rotation & reconciliation") +
          line(7, can("manage_targets"), "Discovery scan") +
          line(8, can("manage_users"), "Work with users & profiles") +
          line(9, true, "Multi-factor authentication (yourself)") +
          line(10, can("read_audit"), "Display audit trail") +
          line(11, true, "Break-glass unseal") +
          line(12, can("manage_users"), "Work with permission profiles") +
          line(13, can("manage_users"), "System configuration") +
          line(14, can("manage_users"), "Effective config & IaC export") +
          line(15, can("manage_users"), "Work with application secrets") +
          "90. Sign off\n";
        term.innerHTML = `${head("PAMMAIN", "PAMV1 Main Menu")}
Select one of the following:

<div class="indent">${menu}</div>
<form id="f-cmd">Selection or command
===&gt; <input id="in-cmd" size="30" autofocus></form>
${fkeys("F3=Sign off   F5=Refresh")}`;
        document.getElementById("f-cmd").onsubmit = async (ev) => {
          ev.preventDefault();
          const c = document.getElementById("in-cmd").value.trim();
          const routes = {
            "1": openTargets, "2": openCreds, "3": openCheckouts, "4": openSessions,
            "5": openRequests, "6": openReconcile, "7": () => go("discovery"),
            "8": openUsers, "9": openMfa, "10": openAudit, "11": () => go("breakglass"),
            "12": openProfiles, "13": openConfig, "14": openEffective,
            "15": openApps, "90": signoff,
          };
          if (routes[c]) { try { await routes[c](); } catch (e) { say("CPF9999: " + e.message, true); render(); } }
          else { say("CPF0001: SELECTION " + c.toUpperCase() + " NOT VALID.", true); render(); }
        };
      },

      targets() {
        back = "main";
        const canManage = can("manage_targets");
        term.innerHTML = `${head("PAMWRKTGT", "Work with Targets")}
Type options, press Enter.
  <span class="cyan">${canManage ? "4=Delete   5=Work with grants" : "(read-only role)"}</span>

<form id="f-list"><table>
<tr><th>Opt</th><th>ID</th><th>Name</th><th>Host</th><th>Port</th><th>OS</th><th>Proto</th><th>Approval</th></tr>
${targets.map((t) => `<tr><td>${opt(t.id)}</td><td>${esc(t.id)}</td><td>${pad(t.name, 16)}</td><td>${pad(t.host, 20)}</td><td>${esc(t.port)}</td><td>${pad(t.os_type, 8)}</td><td>${pad(t.protocol, 6)}</td><td>${t.require_approval ? '<span class="amber">required</span>' : "-"}</td></tr>`).join("")}
</table>${targets.length ? "" : `<div class="cyan indent">(No targets defined.${canManage ? " Press F6 to add." : ""})</div>`}
<input type="submit" hidden></form>
${fkeys(`F3=Exit   F5=Refresh${canManage ? "   F6=Add target" : ""}   F12=Cancel`)}`;
        document.getElementById("f-list").onsubmit = async (ev) => {
          ev.preventDefault();
          try {
            for (const t of targets) {
              const o = optVal(ev.target, t.id);
              if (o === "4") { await api("DELETE", `/api/targets/${t.id}`); say(`TARGET ${String(t.name).toUpperCase()} DELETED.`); }
              else if (o === "5") { return openGrants(t.id); }
              else if (o) { say("CPF0002: OPTION " + o.toUpperCase() + " NOT VALID.", true); }
            }
            await openTargets();
          } catch (e) { say("CPF9999: " + e.message, true); render(); }
        };
      },

      targetadd() {
        back = "targets";
        term.innerHTML = `${head("PAMADDTGT", "Add Target")}
Type choices, press Enter.

<form id="f-add" class="indent">
<label>Name  . . . . . . . :  <input name="name" size="20" required autofocus></label>
<label>Host  . . . . . . . :  <input name="host" size="24" required></label>
<label>Port  . . . . . . . :  <input name="port" type="number" value="22" min="1" max="65535" size="6" required></label>
<label>OS type . . . . . . :  <select name="os_type"><option>linux</option><option>windows</option></select>   <span class="cyan">linux, windows</span></label>
<label>Protocol  . . . . . :  <select name="protocol"><option>ssh</option><option>winrm</option><option>rdp</option></select>   <span class="cyan">ssh, winrm, rdp</span></label>
<label>Require approval  . :  <input name="require_approval" type="checkbox">   <span class="cyan">connections need an approved request (4-eyes)</span></label>
<input type="submit" hidden>
</form>
${fkeys("F3=Exit   F12=Cancel")}`;
        document.getElementById("f-add").onsubmit = async (ev) => {
          ev.preventDefault();
          const f = Object.fromEntries(new FormData(ev.target));
          const body = { name: f.name, host: f.host, port: Number(f.port), os_type: f.os_type, protocol: f.protocol, require_approval: ev.target.require_approval.checked };
          try { await api("POST", "/api/targets", body); say(`TARGET ${String(f.name).toUpperCase()} ADDED.`); await openTargets(); }
          catch (e) { say("CPF9898: " + e.message, true); render(); }
        };
      },

      grants() {
        back = "targets";
        term.innerHTML = `${head("PAMWRKGRT", "Work with Target Grants")}
Grants for target <span class="white">${esc(targetName(grantsTarget))}</span> (id ${esc(grantsTarget)}).
A target with no grants is open to any connect-capable identity.
  <span class="cyan">4=Delete</span>

<form id="f-list"><table>
<tr><th>Opt</th><th>ID</th><th>Subject type</th><th>Subject</th></tr>
${grants.map((g) => `<tr><td>${opt(g.id)}</td><td>${esc(g.id)}</td><td>${pad(g.subject_type, 10)}</td><td>${esc(g.subject)}</td></tr>`).join("")}
</table>${grants.length ? "" : `<div class="cyan indent">(No grants — target is open to all connect-capable identities. F6 to restrict.)</div>`}
<input type="submit" hidden></form>
${fkeys("F3=Exit   F5=Refresh   F6=Add grant   F12=Cancel")}`;
        document.getElementById("f-list").onsubmit = async (ev) => {
          ev.preventDefault();
          try {
            for (const g of grants) {
              const o = optVal(ev.target, g.id);
              if (o === "4") { await api("DELETE", `/api/targets/${grantsTarget}/grants/${g.id}`); say(`GRANT ${g.id} DELETED.`); }
              else if (o) { say("CPF0002: OPTION " + o.toUpperCase() + " NOT VALID.", true); }
            }
            await openGrants(grantsTarget);
          } catch (e) { say("CPF9999: " + e.message, true); render(); }
        };
      },

      grantadd() {
        back = "grants";
        term.innerHTML = `${head("PAMADDGRT", "Add Target Grant")}
Grant access to target <span class="white">${esc(targetName(grantsTarget))}</span>.

<form id="f-add" class="indent">
<label>Subject type  . . . :  <select name="subject_type"><option>role</option><option>user</option></select>   <span class="cyan">role, user</span></label>
<label>Subject . . . . . . :  <input name="subject" size="24" required autofocus>   <span class="cyan">a role (admin/user/…) or a username</span></label>
<input type="submit" hidden>
</form>
${fkeys("F3=Exit   F12=Cancel")}`;
        document.getElementById("f-add").onsubmit = async (ev) => {
          ev.preventDefault();
          const f = Object.fromEntries(new FormData(ev.target));
          try { await api("POST", `/api/targets/${grantsTarget}/grants`, f); say("GRANT ADDED."); await openGrants(grantsTarget); }
          catch (e) { say("CPF9898: " + e.message, true); render(); }
        };
      },

      creds() {
        back = "main";
        const tn = Object.fromEntries(targets.map((t) => [t.id, t.name]));
        const canManage = can("manage_credentials"), canReveal = can("reveal_secret");
        const optsHelp = [canReveal && "5=Display secret   6=Check-out", canManage && "7=Rotate   8=Reconcile", canManage && "4=Delete"].filter(Boolean).join("   ");
        term.innerHTML = `${head("PAMWRKCRD", "Work with Vaulted Credentials")}
Type options, press Enter.
  <span class="cyan">${optsHelp || "(read-only role)"}</span>

<form id="f-list"><table>
<tr><th>Opt</th><th>ID</th><th>Target</th><th>User</th><th>Type</th><th>Secret</th></tr>
${creds.map((c) => `<tr><td>${opt(c.id)}</td><td>${esc(c.id)}</td><td>${pad(tn[c.target_id] || c.target_id, 16)}</td><td>${pad(c.username, 14)}</td><td>${pad(c.secret_type, 8)}</td><td>********</td></tr>`).join("")}
</table>${creds.length ? "" : `<div class="cyan indent">(Vault is empty.${canManage ? " Press F6 to add." : ""})</div>`}
<input type="submit" hidden></form>
${fkeys(`F3=Exit   F5=Refresh${canManage ? "   F6=Add credential" : ""}   F12=Cancel`)}`;
        document.getElementById("f-list").onsubmit = async (ev) => {
          ev.preventDefault();
          try {
            for (const c of creds) {
              const o = optVal(ev.target, c.id);
              if (o === "4") { await api("DELETE", `/api/credentials/${c.id}`); say(`CREDENTIAL ${c.id} DELETED.`); }
              else if (o === "5") { viewCred = await api("POST", `/api/credentials/${c.id}/reveal`); return go("credview"); }
              else if (o === "6") { const r = await api("POST", `/api/credentials/${c.id}/checkout`, {}); viewCred = { id: r.credential_id, target_id: r.target, username: r.username, secret_type: "check-out", secret: r.secret, expires_at: r.expires_at }; return go("credview"); }

              else if (o) { say("CPF0002: OPTION " + o.toUpperCase() + " NOT VALID.", true); }
            }
            await openConfig();
          } catch (e) { say("CPF9999: " + e.message, true); render(); }
        };
      },

      configset() {
        back = "config";
        term.innerHTML = `${head("PAMSETCFG", "Set Configuration Override")}
Identity/SSO/policy overrides apply immediately. Secret values are vault-encrypted.

<form id="f-add" class="indent">
<label>Key . . . . . . . . :  <select name="key">${configItems.map((c) => `<option value="${esc(c.key)}">${esc(c.key)}${c.secret ? " (secret)" : ""}</option>`).join("")}</select></label>
<label>Value . . . . . . . :  <input name="value" size="40" required autofocus></label>
<input type="submit" hidden>
</form>
${fkeys("F3=Exit   F12=Cancel")}`;
        document.getElementById("f-add").onsubmit = async (ev) => {
          ev.preventDefault();
          const fd = new FormData(ev.target);
          try { await api("PUT", "/api/config", { key: fd.get("key"), value: fd.get("value") }); say(`${fd.get("key")} SET.`); await openConfig(); }
          catch (e) { say("CPF9898: " + e.message, true); render(); }
        };
      },

      effective() {
        back = "main";
        const e = effCfg || { backends: {}, hot_swap: false, note: "" };
        const b = e.backends || {};
        const flag = (v) => v ? '<span class="green">ON</span>' : '<span class="cyan">off</span>';
        term.innerHTML = `${head("PAMEFFCFG", "Effective Config & Backend Health")}
Live status of the identity / SSO / policy backends (read-only).

<div class="indent">
Password login (AD) . . :  ${flag(b.password_login)}
OIDC single sign-on . . :  ${flag(b.oidc_login)}
Directory reconcile . . :  ${flag(b.directory_reconcile)}
MFA required  . . . . . :  ${flag(b.mfa_required)}
Reveal disabled . . . . :  ${flag(b.reveal_disabled)}
Approval required . . . :  ${flag(b.approval_required)}
Agent broker  . . . . . :  ${flag(b.broker_enabled)}
Config hot-swap . . . . :  ${flag(e.hot_swap)}
</div>
<div class="cyan indent">${esc(e.note)}</div>
${fkeys("F3=Exit   F5=Refresh   F6=Export .env   F7=Export Helm   F8=Export Terraform   F12=Cancel")}`;
      },

      iacview() {
        back = "effective";
        term.innerHTML = `${head("PAMIACGEN", "IaC Export — " + esc(iacFormat))}
Copy this into the infrastructure-as-code that owns the deployment. Secrets are
placeholders — wire them to your secret store, never commit plaintext.

<pre class="white" style="white-space:pre-wrap">${esc(iacText)}</pre>
${fkeys("F3=Exit   F12=Cancel")}`;
      },

      mfa() {
        back = "main";
        const m = mfaInfo || {};
        const status = m.enrolled ? (m.confirmed ? '<span class="green">enrolled & confirmed</span>' : '<span class="amber">enrolled, NOT confirmed</span>') : '<span class="red">not enrolled</span>';
        term.innerHTML = `${head("PAMMFA", "Multi-Factor Authentication")}
Manage your own TOTP second factor.

<div class="indent">Status  . . . . . . :  ${status}</div>

<form id="f-mfa" class="indent">
<label>Action  . . . . . . :  <select name="act">
  <option value="enroll">Enroll / re-enroll (get a new secret)</option>
  <option value="verify">Confirm / test a code</option>
  <option value="recovery">Generate recovery codes</option>
  <option value="disable">Disable MFA</option>
</select></label>
<label>Code (confirm/disable) :  <input name="otp" size="8" inputmode="numeric" autocomplete="one-time-code"></label>
<input type="submit" hidden>
</form>
<div class="cyan indent">Enrolling shows a secret + otpauth URI to add to your authenticator, then Confirm a code.</div>
${fkeys("F3=Exit   F5=Refresh   F12=Cancel")}`;
        document.getElementById("f-mfa").onsubmit = async (ev) => {
          ev.preventDefault();
          const act = ev.target.act.value, otp = ev.target.otp.value.trim();
          try {
            if (act === "enroll") { mfaEnroll = await api("POST", "/api/mfa/enroll", otp ? { otp } : {}); return go("mfaview"); }
            if (act === "verify") { await api("POST", "/api/mfa/verify", { otp }); say("CODE CONFIRMED."); return openMfa(); }
            if (act === "recovery") { const r = await api("POST", "/api/mfa/recovery-codes", {}); recoveryCodes = r.recovery_codes || []; return go("mfarecovery"); }
            if (act === "disable") { await api("DELETE", "/api/mfa", { otp }); say("MFA DISABLED."); return openMfa(); }
          } catch (e) { say("CPF9898: " + e.message, true); render(); }
        };
      },

      mfaview() {
        back = "mfa";
        const m = mfaEnroll || {};
        term.innerHTML = `${head("PAMMFAENR", "MFA Enrollment")}
Add this to your authenticator app, then Confirm a code (menu 9 → Confirm).

<div class="indent">
Secret  . . . . . . :  <span class="white">${esc(m.secret)}</span>
otpauth URI . . . . :  <span class="white">${esc(m.otpauth_uri)}</span>
</div>
${fkeys("F3=Exit   F12=Cancel")}`;
      },

      mfarecovery() {
        back = "mfa";
        term.innerHTML = `${head("PAMMFAREC", "MFA Recovery Codes")}
<span class="red blink">STORE THESE NOW — each works once, shown only this time.</span>

<div class="indent white">${recoveryCodes.map(esc).join("\n")}</div>
${fkeys("F3=Exit   F12=Cancel")}`;
      },

      discovery() {
        back = "main";
        term.innerHTML = `${head("PAMDISC", "Discovery Scan")}
Probe hosts for reachable SSH / WinRM / RDP ports (no credentials used).

<form id="f-scan" class="indent">
<label>Hosts . . . . . . . :  <input name="hosts" size="40" required autofocus placeholder="10.0.0.5 10.0.0.6 host.example">   <span class="cyan">space/comma separated</span></label>
<label>Ports . . . . . . . :  <input name="ports" size="24" placeholder="(default 22,3389,5985,5986)">   <span class="cyan">optional</span></label>
<label>Onboard as targets  :  <input name="create" type="checkbox">   <span class="cyan">create new targets for hits</span></label>
<input type="submit" hidden>
</form>
${discovered ? `<hr><div class="white">Candidates: ${discovered.candidates ? discovered.candidates.length : 0}   Created: ${discovered.created ? discovered.created.length : 0}</div>
<table><tr><th>Host</th><th>Port</th><th>OS</th><th>Proto</th></tr>
${(discovered.candidates || []).map((c) => `<tr><td>${pad(c.host, 20)}</td><td>${esc(c.port)}</td><td>${pad(c.os_type, 8)}</td><td>${esc(c.protocol)}</td></tr>`).join("")}</table>` : ""}
${fkeys("F3=Exit   F12=Cancel")}`;
        document.getElementById("f-scan").onsubmit = async (ev) => {
          ev.preventDefault();
          const hosts = ev.target.hosts.value.split(/[\s,]+/).filter(Boolean);
          const ports = ev.target.ports.value.split(/[\s,]+/).filter(Boolean).map(Number).filter((n) => n > 0);
          try {
            discovered = await api("POST", "/api/discovery/scan", { hosts, ports, create: ev.target.create.checked });
            say(`SCAN COMPLETE — ${discovered.candidates ? discovered.candidates.length : 0} candidate(s), ${discovered.created ? discovered.created.length : 0} onboarded.`);
            render();
          } catch (e) { say("CPF9898: " + e.message, true); render(); }
        };
      },

      reconcile() {
        back = "main";
        const rep = reconcileReport;
        term.innerHTML = `${head("PAMRECON", "Credential Reconciliation")}
Read-only drift scan: does each vaulted secret still authenticate to its target?
${rep ? `<div class="white">Checked: ${esc(rep.checked)}   Out of sync: <span class="${rep.out_of_sync ? "red" : "green"}">${esc(rep.out_of_sync)}</span></div>
<table><tr><th>Cred</th><th>Target</th><th>User</th><th>Status</th><th>Detail</th></tr>
${(rep.results || []).map((r) => `<tr><td>${esc(r.credential_id)}</td><td>${pad(r.target, 14)}</td><td>${pad(r.username, 12)}</td><td class="${r.status === "out_of_sync" ? "red" : r.status === "in_sync" ? "green" : "amber"}">${esc(r.status)}</td><td class="detail">${esc(r.detail || "")}</td></tr>`).join("")}</table>` : `<div class="cyan">Loading…</div>`}
<div class="cyan">Remediate drift by rotating the credential (menu 2, option 7).</div>
${fkeys("F3=Exit   F5=Refresh   F12=Cancel")}`;
      },

      audit() {
        back = "main";
        term.innerHTML = `${head("PAMDSPAUD", "Display Audit Trail")}
<input id="in-filter" size="30" placeholder="filter (actor/action/detail)"> <span class="cyan">type to filter</span>
<table id="aud">
<tr><th>Timestamp</th><th>Actor</th><th>Action</th><th>Detail</th></tr>
${auditRows(audit)}
</table>${audit.length ? "" : `<div class="cyan indent">(Audit trail is empty.)</div>`}
${fkeys("F3=Exit   F5=Refresh   F9=Export CSV   F12=Cancel")}`;
        const fin = document.getElementById("in-filter");
        fin.oninput = () => {
          const q = fin.value.toLowerCase();
          const rows = audit.filter((e) => (e.actor + " " + e.action + " " + e.detail).toLowerCase().includes(q));
          document.getElementById("aud").innerHTML = `<tr><th>Timestamp</th><th>Actor</th><th>Action</th><th>Detail</th></tr>` + auditRows(rows);
        };
      },

      breakglass() {
        back = "main";
        term.innerHTML = `${head("PAMBGLAS", "Break-Glass Unseal")}
<span class="red">Emergency quorum unseal.</span> Each holder submits their hex share; when
the M-of-N threshold is met an audited, auto-expiring admin session is issued.

<form id="f-bg" class="indent">
<label>Your share (hex)  . :  <input name="share" size="48" required autofocus autocomplete="off"></label>
<input type="submit" hidden>
</form>
${fkeys("F3=Exit   F12=Cancel")}`;
        document.getElementById("f-bg").onsubmit = async (ev) => {
          ev.preventDefault();
          try {
            const r = await api("POST", "/api/breakglass/unseal", { share: ev.target.share.value.trim() });
            if (r.token) { apiKey = r.token; sessionStorage.setItem("pam_api_key", apiKey); await loadMe(); say("BREAK-GLASS QUORUM MET — emergency admin session active."); return go("main"); }
            say(`SHARE ACCEPTED — ${r.collected}/${r.needed} collected.`);
            render();
          } catch (e) { say("CPF9898: " + e.message, true); render(); }
        };
      },
    })[screen]();
    focusPrimary();
  }

  // focusPrimary lands the cursor on the screen's primary field after every
  // render, so the operator never has to reach for the mouse to start typing
  // (dynamically-inserted autofocus attributes do not reliably fire). Prefers an
  // explicit [autofocus], then the first real input/select, then a link.
  function focusPrimary() {
    const el = term.querySelector("[autofocus]") ||
      term.querySelector("input:not([type=hidden]):not([type=submit]):not([type=checkbox]), select, textarea") ||
      term.querySelector("a[href]");
    if (el) { try { el.focus({ preventScroll: false }); } catch (e) {} }
  }

  function auditRows(list) {
    return list.map((e) => { const bg = e.actor === "break-glass";
      return `<tr${bg ? ` class="red"` : ""}><td class="cyan">${fmtTime(e.ts)}</td><td>${bg ? `<span class="red blink">BREAK-GLASS</span>` : esc(e.actor)}</td><td>${esc(e.action)}</td><td class="detail">${esc(e.detail)}</td></tr>`; }).join("");
  }

  function go(s) {
    if (s !== "credview") viewCred = null;
    if (s !== "usercreated") newUser = null;
    if (s !== "appcreated") newApp = null;
    stopLive();
    screen = s; render(); msg = ""; msgErr = false;
  }
  function signoff() { stopLive(); apiKey = ""; me = null; sessionStorage.removeItem("pam_api_key"); say("SIGN OFF COMPLETE."); go("signon"); }

  const refreshers = { targets: openTargets, creds: openCreds, sessions: openSessions, checkouts: openCheckouts, users: openUsers, mfa: openMfa, audit: openAudit, reconcile: openReconcile, requests: openRequests, grants: () => openGrants(grantsTarget), profiles: openProfiles, config: openConfig, effective: openEffective, apps: openApps, appgrants: () => openAppGrants(grantsApp) };
  const adders = { targets: () => go("targetadd"), creds: () => go("credadd"), grants: () => go("grantadd"), users: () => go("useradd"), requests: () => go("requestadd"), profiles: () => go("profileadd"), config: () => go("configset"), apps: () => go("appadd"), appgrants: () => go("appgrantadd") };

  window.addEventListener("keydown", async (ev) => {
    const k = ev.key;
    // Arrow keys move between subfile option cells (5250-style row navigation), so
    // a whole list of rows is operable without the mouse.
    if ((k === "ArrowDown" || k === "ArrowUp") && ev.target.classList && ev.target.classList.contains("opt")) {
      const opts = [...term.querySelectorAll("input.opt")];
      const i = opts.indexOf(ev.target);
      if (i >= 0) {
        ev.preventDefault();
        const next = opts[k === "ArrowDown" ? i + 1 : i - 1];
        if (next) next.focus();
      }
      return;
    }
    // Esc cancels / goes back (the keyboard twin of F12), except at sign-on/main.
    if (k === "Escape") {
      if (screen === "signon" || screen === "main") return;
      ev.preventDefault();
      go(back);
      return;
    }
    if (!["F3", "F5", "F6", "F7", "F8", "F9", "F12"].includes(k)) return;
    ev.preventDefault();
    if (screen === "signon") return;
    try {
      if (k === "F3") { screen === "main" ? signoff() : go("main"); }
      else if (k === "F5") { const r = refreshers[screen]; if (r) await r(); else render(); }
      else if (k === "F6") { if (screen === "effective") await exportIaC("env"); else { const a = adders[screen]; if (a) a(); } }
      else if (k === "F7") { if (screen === "effective") await exportIaC("helm"); }
      else if (k === "F8") { if (screen === "effective") await exportIaC("terraform"); }
      else if (k === "F9") { if (screen === "audit") await exportAudit(); else if (screen === "users") await reconcileIdentities(); }
      else if (k === "F12") { go(back); }
    } catch (e) { say("CPF9999: " + e.message, true); render(); }
  });

  setInterval(() => { const el = term.querySelector(".row .cyan"); if (el && screen !== "audit") el.textContent = now(); }, 1000);
  if (apiKey) { loadMe().then(render).catch(() => { apiKey = ""; me = null; screen = "signon"; render(); }); } else render();
})();
</script>
</body>
</html>
